seed: 42

data:
  state: "arkansas"
  bands_path:  "data/processed/arkansas_bands_2021.npy"
  masks_path:  "data/processed/arkansas_masks_2021.npy"
  labels_path: "data/processed/arkansas_labels_2021.npy"
  n_per_class: 300
  val_ratio:   0.2

