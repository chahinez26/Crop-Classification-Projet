model:
  n_bands:     10
  n_stages:    3
  d_model:     64
  n_heads:     5
  kernel_size: 3
  dropout:     0.1

training:
  batch_size:              32
  epochs:                  200
  learning_rate:           0.001
  early_stopping_patience: 20

output:
  checkpoint_dir: "outputs/checkpoints/"
  figures_dir:    "outputs/figures/"